## Input
input {
    kb_layout = us
    kb_variant = intl
    kb_model =
    kb_options = caps:swapescape
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    accel_profile = flat

    touchpad {
        natural_scroll = false
    }
}

env = GTK_IM_MODULE=cedilla
env = QT_IM_MODULE=cedilla

